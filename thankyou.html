<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - ProMotion Simulators</title>
    <style>
        :root { --bg: #0f172a; --accent: #3b82f6; --text: #e2e8f0; --muted: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; max-width: 600px; padding: 2rem; }
        .icon { font-size: 4rem; margin-bottom: 1.5rem; }
        h1 { font-size: 2rem; margin-bottom: 1rem; background: linear-gradient(to right, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: var(--muted); font-size: 1.1rem; margin-bottom: 2rem; line-height: 1.6; }
        .btn { display: inline-block; padding: 1rem 2rem; background: var(--accent); color: white; border-radius: 8px; text-decoration: none; font-weight: 700; transition: 0.2s; }
        .btn:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎉</div>
        <h1>Thank You for Your Inquiry!</h1>
        <p>We've received your request for a custom simulation platform. Our team will review your requirements and contact you within 24 hours with a detailed proposal.</p>
        <p style="font-size: 0.9rem;">For urgent inquiries, you can also reach us at <a href="mailto:260240751@qq.com" style="color: var(--accent);">260240751@qq.com</a></p>
        <a href="/" class="btn">Back to Website</a>
    </div>
</body>
</html>
